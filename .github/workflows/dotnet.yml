name: .NET CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FloorPlanGeneration.sln

      - name: Build
        run: dotnet build FloorPlanGeneration.sln --configuration Release --no-restore --nologo --verbosity minimal

      - name: Test
        run: dotnet test FloorPlanGeneration.sln --configuration Release --no-build --nologo --verbosity minimal

      - name: Pack
        run: dotnet pack FloorPlanGeneration.sln --configuration Release --no-build --nologo --verbosity minimal
