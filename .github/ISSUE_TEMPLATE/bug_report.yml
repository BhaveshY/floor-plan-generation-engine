name: Bug report
description: Report incorrect generation, validation, CLI, or schema behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: Input or command
      description: Include the JSON input, sample name, or CLI command that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 or commit SHA"
